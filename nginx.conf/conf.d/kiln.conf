# ─── Kiln ATS — server block ─────────────────────────────────────────
# Thin dispatcher: owns listen + server_name, then includes the
# per-concern location blocks.
#
#   backend  → /api/*                         snippets/kiln-backend.conf
#   frontend → /_next/* + everything else     snippets/kiln-frontend.conf
#
# Split so each team owns its routing file independently — a frontend
# caching tweak doesn't touch the backend file and vice versa.
# Replace `server_name _` with your actual domain once DNS is set up.
# ─────────────────────────────────────────────────────────────────────

server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    # For TLS: swap this block for a 301 to https and move the includes
    # below into a :443 server block. See ../snippets/tls-example.conf.

    # Backend routes — put first so /api never gets swallowed by the
    # frontend's catch-all `location /`. Order of include matters.
    include /etc/nginx/snippets/kiln-backend.conf;

    # Frontend routes — Next.js SSR + static assets.
    include /etc/nginx/snippets/kiln-frontend.conf;

    # External health probe (monitors, CF health checks, etc.)
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
