# ─── Kiln ATS server block ───────────────────────────────────────────
# Routes:
#   /api/*       → kiln_backend  (Go + Fiber on :8080)
#   /_next/*     → kiln_frontend (Next.js static assets, long-cacheable)
#   everything   → kiln_frontend (Next.js SSR / pages)
#
# Replace `server_name _` with your actual domain once DNS is set up.
# ─────────────────────────────────────────────────────────────────────

server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    # When TLS is enabled (Cloudflare proxy OR certbot), swap the block above
    # for a 301 redirect to HTTPS and move the locations below into a :443
    # server block. See ../snippets/tls-example.conf.

    # ─── Backend API ─────────────────────────────────────────────────
    location /api/ {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://kiln_backend;

        # keepalive to upstream requires HTTP/1.1 + empty Connection
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # Long-poll / SSE / AI streaming — disable buffering on these routes
        # if the backend starts using them:
        # proxy_buffering off;
        # proxy_read_timeout 300s;
    }

    # ─── Next.js hashed static assets — long cache ───────────────────
    location /_next/static/ {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://kiln_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # Next.js fingerprints these — safe to cache aggressively
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ─── Next.js optimized images ────────────────────────────────────
    location /_next/image {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://kiln_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # Next.js image optimizer output — cache but allow revalidation
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # ─── Frontend catch-all (SSR pages + everything else) ────────────
    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://kiln_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # Next.js server actions / RSC can be chatty; bump read timeout
        proxy_read_timeout 75s;
    }

    # ─── Health probe for external monitors ──────────────────────────
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
