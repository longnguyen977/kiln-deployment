# ─── Upstream pools ──────────────────────────────────────────────────
# One pool per service. Today each has a single instance — add more
# `server` lines when horizontal scaling kicks in and nginx will
# load-balance between them with least_conn.
#
# least_conn:       sends each request to the upstream with the fewest
#                   in-flight connections. Better than round-robin for
#                   variable-length API workloads.
#
# max_fails/fail_timeout: mark upstream "unavailable" after 3 failures
#                   within 10 s; re-probe after 10 s.
#
# keepalive:        maintain N idle connections per worker back to the
#                   upstream. Cuts TCP handshake per request.
# ─────────────────────────────────────────────────────────────────────

upstream kiln_backend {
    least_conn;

    server 127.0.0.1:8080  max_fails=3 fail_timeout=10s;
    # server 127.0.0.1:8081  max_fails=3 fail_timeout=10s;   # scale out here
    # server 127.0.0.1:8082  max_fails=3 fail_timeout=10s;

    keepalive          32;
    keepalive_requests 1000;
    keepalive_timeout  60s;
}

upstream kiln_frontend {
    least_conn;

    server 127.0.0.1:3000  max_fails=3 fail_timeout=10s;
    # server 127.0.0.1:3001  max_fails=3 fail_timeout=10s;   # scale out here

    keepalive          32;
    keepalive_requests 1000;
    keepalive_timeout  60s;
}
