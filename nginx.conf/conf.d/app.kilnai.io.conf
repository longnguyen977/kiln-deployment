# ─── app.kilnai.io — frontend subdomain ──────────────────────────────
# User-facing Next.js application. The Next.js server acts as the
# proxy to the Go backend (browser → /api → Next.js route handler →
# Go). Real backend endpoints are NOT exposed to the browser from
# this subdomain.
# ─────────────────────────────────────────────────────────────────────

server {
    listen       80;
    listen       [::]:80;
    server_name  app.kilnai.io;

    # Cloudflare terminates TLS at the edge; origin receives plain HTTP.
    # SG is already locked to CF IPv4 ranges.

    include /etc/nginx/snippets/security-headers.conf;

    access_log /var/log/nginx/app.kilnai.io.access.log main buffer=32k flush=1s;
    error_log  /var/log/nginx/app.kilnai.io.error.log  warn;

    # Whole subdomain proxies to Next.js
    include /etc/nginx/snippets/kiln-frontend.conf;

    # Health probe for external monitors
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
