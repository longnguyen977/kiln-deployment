# ─── api.kilnai.io — backend subdomain ───────────────────────────────
# Public entrypoint for:
#   - external API clients (Chrome extension, future mobile apps)
#   - OAuth callbacks (Google, Gmail)
#   - third-party webhooks
#
# Browser traffic from the Next.js app does NOT come through here —
# it goes through app.kilnai.io which proxies to Go internally.
# ─────────────────────────────────────────────────────────────────────

server {
    listen       80;
    listen       [::]:80;
    server_name  api.kilnai.io;

    # Cloudflare terminates TLS at the edge; origin receives plain HTTP
    # over the CF→AWS path (Cloudflare "Flexible" mode). SG is already
    # locked to CF IPv4 ranges — no other sources can reach :80.

    # Security headers (applied to every response via `always`)
    include /etc/nginx/snippets/security-headers.conf;

    # Per-subdomain access log so api / app traffic are cleanly separable
    access_log /var/log/nginx/api.kilnai.io.access.log main buffer=32k flush=1s;
    error_log  /var/log/nginx/api.kilnai.io.error.log  warn;

    # Whole subdomain proxies to the Go backend
    include /etc/nginx/snippets/kiln-backend.conf;

    # Health probe for external monitors
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
