# ─── default-reject — catch-all for unrecognized Host headers ────────
# Any request that doesn't match api.kilnai.io or app.kilnai.io lands
# here:
#   - direct IP scans (13.213.59.10)
#   - random / probing subdomains (admin.kilnai.io, .env, etc.)
#   - missing Host header
#
# Returns 444 — nginx non-standard "close connection without response".
# Bots give up fastest; no useful info leakage; no latency spent
# rendering an error page.
#
# LATER: when you're ready, flip this to a 301 redirect to your
# landing page (e.g. `return 301 https://kilnai.io$request_uri;`).
# ─────────────────────────────────────────────────────────────────────

server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    # Keep a small access log so you can see who's probing
    access_log /var/log/nginx/rejected.access.log main buffer=32k flush=5s;

    return 444;
}
