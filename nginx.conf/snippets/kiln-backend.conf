# ─── Kiln ATS — backend routes (for api.* subdomain) ─────────────────
# Included from conf.d/api.kilnai.io.conf's server{} block. Every path
# on the subdomain is proxied to the Go + Fiber upstream — no /api
# prefix filtering, the whole subdomain is dedicated.
# ─────────────────────────────────────────────────────────────────────

location / {
    include /etc/nginx/snippets/proxy-common.conf;
    proxy_pass http://kiln_backend;

    # keepalive to upstream requires HTTP/1.1 + empty Connection
    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    # Long-poll / SSE / AI streaming — enable per-route if the backend
    # starts streaming (e.g. /v1/ai/stream):
    # proxy_buffering off;
    # proxy_read_timeout 300s;
}

# Backend's own health endpoint (if it adds /healthz later — otherwise
# this 404s, which is fine)
location = /healthz {
    access_log off;
    include /etc/nginx/snippets/proxy-common.conf;
    proxy_pass http://kiln_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
}
