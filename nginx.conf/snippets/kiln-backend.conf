# ─── Kiln ATS — backend routes ───────────────────────────────────────
# Everything proxied to the kiln_backend upstream (Go + Fiber :8080).
# Included from conf.d/kiln.conf's server{} block — do NOT drop into
# conf.d/ directly, location{} must live inside a server{}.
#
# Routes owned here:
#   /api/*   REST API, OAuth callbacks, Gmail integration, etc.
# ─────────────────────────────────────────────────────────────────────

location /api/ {
    include /etc/nginx/snippets/proxy-common.conf;
    proxy_pass http://kiln_backend;

    # keepalive to upstream requires HTTP/1.1 + empty Connection
    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    # Long-poll / SSE / AI streaming — enable per-route if the backend
    # starts streaming (e.g. /api/v1/ai/stream):
    # proxy_buffering off;
    # proxy_read_timeout 300s;
}
