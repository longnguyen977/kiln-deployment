# Shared proxy settings — include into each `location` that proxies.
#
# Why each header:
#   Host                 upstream-side routing + NextAuth trusted-host checks
#   X-Real-IP            single client IP (simple apps)
#   X-Forwarded-For      chain of proxies — most apps read this
#   X-Forwarded-Proto    so upstream can generate correct https:// links
#   X-Forwarded-Host     original Host before nginx rewrote it
#   X-Forwarded-Port     so upstream knows the external port

proxy_set_header  Host               $host;
proxy_set_header  X-Real-IP          $remote_addr;
proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
proxy_set_header  X-Forwarded-Proto  $scheme;
proxy_set_header  X-Forwarded-Host   $host;
proxy_set_header  X-Forwarded-Port   $server_port;

# Timeouts — proxy_read_timeout is NOT set here because some locations
# need to override it (e.g. Next.js RSC streaming wants 75s, AI streaming
# routes want 300s). nginx disallows the same directive twice in the
# same context, so leaving it off here lets each location set its own
# without colliding with the include. Nginx default is 60s.
proxy_connect_timeout  5s;
proxy_send_timeout     60s;

# Buffering — on for normal requests, override to `off` per location
# for long-poll / SSE / streaming.
proxy_buffering        on;
proxy_buffer_size      16k;
proxy_buffers          8 16k;
proxy_busy_buffers_size 32k;

# Don't stop proxying if the upstream closes a single connection
proxy_next_upstream    error timeout http_502 http_503 http_504;
proxy_next_upstream_tries 2;
