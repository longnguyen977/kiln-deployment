# TLS server block template.
#
# Two deployment patterns:
#
#   A. Cloudflare in front (recommended):
#      - Cloudflare terminates TLS with an edge cert
#      - Origin runs plain HTTP; CF connects via "Full (strict)" using
#        a CF Origin Certificate OR Let's Encrypt.
#      - Tighten SG ingress to Cloudflare IPs only (see kiln-deployment
#        README — Security Group section).
#
#   B. Direct Let's Encrypt on origin:
#      - Install certbot: `sudo apt install certbot python3-certbot-nginx`
#      - `sudo certbot --nginx -d kiln.example.com`
#      - Certbot will edit this server block in place.
#
# Replace your domain name below.

server {
    listen       443 ssl http2;
    listen       [::]:443 ssl http2;
    server_name  kiln.example.com;

    # Certbot writes these paths; tweak if you're using CF Origin certs.
    ssl_certificate     /etc/letsencrypt/live/kiln.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kiln.example.com/privkey.pem;

    # Modern TLS settings (Mozilla "intermediate" preset, 2026)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP stapling
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout          5s;

    # Security headers
    include /etc/nginx/snippets/security-headers.conf;

    # Then paste the location blocks from conf.d/kiln.conf
    # (everything inside the existing server{} except listen/server_name).
}

# HTTP → HTTPS redirect
server {
    listen      80;
    listen      [::]:80;
    server_name kiln.example.com;
    return      301 https://$host$request_uri;
}
