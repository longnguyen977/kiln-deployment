# Basic security headers. Include at the server{} level, NOT inside
# each location, so they apply to every response.
#
# CSP is deliberately commented — it requires real app analysis
# (Next.js generates inline scripts). Add it once you've audited.

add_header  X-Frame-Options         "SAMEORIGIN"             always;
add_header  X-Content-Type-Options  "nosniff"                always;
add_header  Referrer-Policy         "strict-origin-when-cross-origin" always;
add_header  Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

# Uncomment once you have HTTPS everywhere:
# add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Content-Security-Policy — audit before enabling. A starting point:
# add_header Content-Security-Policy
#   "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.posthog.com; connect-src 'self' https://*.posthog.com; frame-ancestors 'self';"
#   always;
