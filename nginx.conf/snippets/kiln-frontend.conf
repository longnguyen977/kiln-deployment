# ─── Kiln ATS — frontend routes (for app.* subdomain) ────────────────
# Included from conf.d/app.kilnai.io.conf's server{} block.
#
# Next.js owns the whole subdomain. Browser-side /api/* calls land
# on Next.js (which internally proxies to the Go backend — that's the
# "Next.js as proxy" pattern) so we don't route /api here.
#
# Routes:
#   /_next/static/*   hashed static assets (1-year immutable cache)
#   /_next/image      Next.js optimized images (1-day cache)
#   /                 SSR pages + everything else (incl. /api/* proxy)
# ─────────────────────────────────────────────────────────────────────

# Next.js hashed static assets — safe to cache forever
location /_next/static/ {
    include /etc/nginx/snippets/proxy-common.conf;
    proxy_pass http://kiln_frontend;
    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}

# Next.js optimized-image pipeline output — cache but allow revalidation
location /_next/image {
    include /etc/nginx/snippets/proxy-common.conf;
    proxy_pass http://kiln_frontend;
    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    expires 1d;
    add_header Cache-Control "public, max-age=86400" always;
}

# Catch-all — SSR pages, RSC, /api/* proxied through Next.js to Go
location / {
    include /etc/nginx/snippets/proxy-common.conf;
    proxy_pass http://kiln_frontend;
    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    # Server actions / RSC streaming can be chatty; give it some room.
    proxy_read_timeout 75s;
}
