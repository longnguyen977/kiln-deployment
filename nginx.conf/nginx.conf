# ─── Kiln ATS — nginx reverse proxy ──────────────────────────────────
# Deploys to /etc/nginx/nginx.conf on the EC2 host (symlinked from
# this repo — see nginx.conf/README.md).
#
# Fronts two host-bound docker services:
#   - kiln-backend-service    127.0.0.1:8080     (Go + Fiber)
#   - kiln-frontend-service   127.0.0.1:3000     (Next.js)
#
# TLS: for now plain HTTP. Put Cloudflare in front for TLS termination,
# or add a 443 server block + certbot when you're ready. See snippets/.

user                 nginx;
worker_processes     auto;              # one worker per CPU core
worker_rlimit_nofile 65535;             # bump fd limit per worker

# PID and error log — error_log overridden per-server for access logs
pid        /run/nginx.pid;
error_log  /var/log/nginx/error.log warn;

events {
    worker_connections  4096;           # (per worker) cores * 4096 = total
    use                 epoll;          # Linux-only high-perf event model
    multi_accept        on;             # accept all pending connections in one go
}

http {
    # ─── Core ────────────────────────────────────────────────────────
    include             mime.types;
    default_type        application/octet-stream;
    charset             utf-8;
    server_tokens       off;            # don't leak nginx version in headers

    # Hash buckets — larger for many upstreams / long server_names
    types_hash_max_size              2048;
    server_names_hash_bucket_size    128;

    # ─── Logging ─────────────────────────────────────────────────────
    # Includes upstream timing so you can see backend vs total latency
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time uct=$upstream_connect_time '
                      'uht=$upstream_header_time urt=$upstream_response_time '
                      'upstream=$upstream_addr';

    access_log  /var/log/nginx/access.log  main buffer=32k flush=1s;

    # ─── Trust Cloudflare for real client IPs ────────────────────────
    # SG only allows CF IPv4 ranges inbound, so every request here
    # comes from a CF edge. Use CF-Connecting-IP to get the real user
    # IP into $remote_addr (access logs, rate-limits, etc).
    include /etc/nginx/snippets/cloudflare-real-ip.conf;

    # ─── Performance ─────────────────────────────────────────────────
    sendfile                 on;
    tcp_nopush               on;
    tcp_nodelay              on;
    keepalive_timeout        65;
    keepalive_requests       1000;
    reset_timedout_connection on;

    # Client timeouts — hang up on slow / broken clients
    client_header_timeout    60s;
    client_body_timeout      60s;
    send_timeout             60s;

    # CV uploads can be chunky; PDFs 5–20 MB. Cap generously.
    client_max_body_size     25m;
    client_body_buffer_size  128k;

    # ─── Compression ─────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/x-font-ttf
        font/woff
        font/woff2
        image/svg+xml
        image/x-icon;

    # ─── Pluggable config ────────────────────────────────────────────
    include  /etc/nginx/conf.d/*.conf;
}
