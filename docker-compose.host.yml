# ──────────────────────────────────────────────────────────────────────
# Kiln ATS — HOST-NETWORK variant.
#
# Used when --internal is selected on deploy.sh. Both services join the
# host's network stack (network_mode: host), so:
#
#   - localhost:5432 inside the container reaches the host's Postgres
#   - the backend listens directly on host port 8080 (no port mapping)
#   - the frontend listens directly on host port 3000
#   - the frontend reaches the backend at http://127.0.0.1:8080
#
# Trade-offs vs docker-compose.yml (bridge mode):
#   + No host.docker.internal gymnastics for DB
#   + Lower latency (no docker-proxy hop for inbound traffic)
#   - Linux only; Docker Desktop on mac only half-supports it
#   - No container DNS: services can't reach each other by name
#   - ports/extra_hosts/networks are all ignored
#
# Managed by deploy.sh — don't edit service versions by hand.
# ──────────────────────────────────────────────────────────────────────

services:
  kiln-backend-service:
    image: kiln-backend:${VERSION_BACKEND:?VERSION_BACKEND missing — run deploy.sh}
    container_name: kiln-backend-service
    restart: unless-stopped
    network_mode: host
    env_file:
      - ${BACKEND_ENV_FILE:?BACKEND_ENV_FILE missing — run deploy.sh}
    # URLs — not secrets, come from deploy/<env>.env (committed) so the
    # team has one source of truth per env. These override anything in
    # the env_file above.
    environment:
      FRONTEND_URL:        ${FRONTEND_URL:?FRONTEND_URL missing — set in deploy/<env>.env}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:?GOOGLE_REDIRECT_URL missing — set in deploy/<env>.env}
      GMAIL_REDIRECT_URL:  ${GMAIL_REDIRECT_URL:?GMAIL_REDIRECT_URL missing — set in deploy/<env>.env}
      # `?` (no colon) fails only on UNSET — empty string is a valid
      # value for local dev (host-only cookie).
      COOKIE_DOMAIN:       ${COOKIE_DOMAIN?COOKIE_DOMAIN missing — set in deploy/<env>.env (empty for dev, .kilnai.io for prod)}
    # Mount Google OAuth credentials from host so they aren't baked
    # into the image. File must exist at backend/credentials/google_oauth.json
    # on the host (chmod 600). The :ro flag makes it read-only in the container.
    volumes:
      - ./backend/credentials:/app/credentials:ro
    # No healthcheck yet — add once backend exposes /healthz.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  kiln-frontend-service:
    image: kiln-frontend:${VERSION_FRONTEND:?VERSION_FRONTEND missing — run deploy.sh}
    container_name: kiln-frontend-service
    restart: unless-stopped
    network_mode: host
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      BACKEND_URL: ${BACKEND_URL:?BACKEND_URL missing — run deploy.sh}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
